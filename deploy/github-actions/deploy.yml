name: Deploy to Multiple Clouds

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-aws:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: softkillbot
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to AWS ECS
        run: |
          aws ecs update-service \
            --cluster softkillbot \
            --service softkillbot-service \
            --force-new-deployment

  deploy-gcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and push to Google Container Registry
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/softkillbot:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy softkillbot \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/softkillbot:${{ github.sha }} \
            --set-env-vars TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }},SOPHIA_API_TOKEN=${{ secrets.SOPHIA_API_TOKEN }} \
            --region us-central1

  deploy-azure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push Docker image
        run: |
          az acr build \
            --registry softkillbot \
            --image softkillbot:${{ github.sha }} .

      - name: Deploy to Container Instances
        run: |
          az container create \
            --resource-group softkillbot \
            --name softkillbot \
            --image softkillbot.azurecr.io/softkillbot:${{ github.sha }} \
            --environment-variables TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}

  deploy-heroku:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.12.12
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: "softkillbot"
          heroku_email: ${{ secrets.HEROKU_EMAIL }}

  deploy-digitalocean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to DigitalOcean App Platform
        uses: chrnorm/digitalocean-action@v1.3.0
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          command: apps update ${{ secrets.DO_APP_ID }} --spec deploy/digitalocean/app.yaml

  notify:
    needs: [deploy-aws, deploy-gcp, deploy-azure, deploy-heroku, deploy-digitalocean]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 Softkillbot Deployment Status:
            AWS: ${{ job.deploy-aws.status }}
            GCP: ${{ job.deploy-gcp.status }}
            Azure: ${{ job.deploy-azure.status }}
            Heroku: ${{ job.deploy-heroku.status }}
            DigitalOcean: ${{ job.deploy-digitalocean.status }}
