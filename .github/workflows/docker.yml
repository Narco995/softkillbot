name: Docker Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -f docker/Dockerfile -t softkillbot:latest .
    
    - name: Test Docker image
      run: docker run --rm softkillbot:latest python -m pytest tests/ -v